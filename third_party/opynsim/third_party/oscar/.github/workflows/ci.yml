on: [push]

jobs:

  windows_amd64:
    name: Windows (amd64)
    runs-on: windows-2022
    env:
      # Filter out tests that require OpenGL 3.3 support (GitHub Windows
      # runner doesn't support it).
      OSCAR_TEST_EXCLUDE_FILTER: "RenderQueueFixture|Graphics|MaterialTest|MeshDepthWritingMaterialFixture|MeshNormalVectorsMaterialFixture|ShaderTest|RegisteredDemoTabsTest"
    steps:
    - uses: actions/checkout@v4

    - name: Run Build Script
      run: ./scripts/e2e_build_windows.bat

  ubuntu22_amd64:
    name: Ubuntu 22.04 (amd64)
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup system
      run: cd $GITHUB_WORKSPACE && sudo apt-get update && sudo apt-get install $(sed 's/#.*//' "docker/ubuntu22_apt.txt" | xargs)

      # Use `xvfb-run` so that the UI tests can run against a virtual windowing system
      # Use `gcc` 12, because OpenSim Creator uses C++20, which is a bit new for Ubuntu 22.04
    - name: Run Build Script
      run: cd $GITHUB_WORKSPACE && CC=gcc-12 CXX=g++-12 xvfb-run ./scripts/e2e_build_unix.sh

  macos_universal:
    name: MacOS (universal?)
    runs-on: macos-14
    env:
        # GitHub macOS runner can get jammed up if running multithreaded
        CTEST_PARALLEL_LEVEL: 1
    steps:
    - uses: actions/checkout@v4

    - name: Run Build Script
      run: ./scripts/e2e_build_unix.sh
